# docker-compose.yml
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail123
      POSTGRES_DB: retail_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres

volumes:
  pgdata: